# 사이트 설정
site_name: Wiggle 2 RTX
site_url: https://mayalhc.github.io/Wiggle2-RTX/
site_author: chamiseul

# 마크다운 확장 기능 (기능 강화)
markdown_extensions:
  - admonition       # 경고/정보/꿀팁 박스 (콜아웃)
  - tables           # 표 지원
  - pymdownx.details # 접기/펴기 기능
  - pymdownx.superfences # 코드 블록 강화
  
# 테마 설정 (GroomForge와 통일감 유지)
theme:
  name: readthedocs
  highlightjs: true
  collapse_navigation: false  # 전체 메뉴를 항상 펼침
  sticky_navigation: true
  navigation_depth: 4
  titles_only: false 

extra_css:
  - custom.css

# 네비게이션 (Wiggle 2 RTX 전용 메뉴 구조)
nav:
  - Wiggle 2 RTX Guide: 
      - "Welcome to Wiggle 2 RTX": index.md
      # - "Installation & Setup": installation.md
      # - "Layered Physics System": layered_physics.md
      # - "Keyframe & Sim Baking": baking.md
      # - "Sim Mix & Safety Guard": sim_mix.md
      # - "GroomForge Integration": integration.md
  
  # GroomForge 위키로 바로가는 연결 고리 (상단 메뉴)
  - "Go to GroomForge Wiki": 'https://mayalhc.github.io/GroomForge-Wiki/'

# 플러그인 설정
plugins:
  - search # 검색창 기능
